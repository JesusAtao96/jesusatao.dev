<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Minimalist "JA." Portfolio Favicon -->
  <defs>
    <style>
      .bg { fill: transparent; }
      .text { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        font-weight: 900; 
        font-size: 18px; 
        fill: #131313; 
        letter-spacing: -1px;
      }
      .dot { fill: #00ff41; }
      @media (prefers-color-scheme: dark) {
        .text { fill: #e5e2e1; }
      }
    </style>
  </defs>
  <rect width="32" height="32" class="bg" />
  <text x="2" y="22" class="text">JA</text>
  <circle cx="28" cy="22" r="3" class="dot" />
</svg>
